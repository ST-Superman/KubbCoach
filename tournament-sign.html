<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kubb Coach - Yard Sign</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* 11 x 8.5 inches landscape at 96dpi */
        .sign {
            width: 1056px;
            height: 816px;
            background: #ffffff;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            padding: 80px 80px;
            transform-origin: top left;
            position: relative;
            overflow: hidden;
        }

        /* Top bar */
        .sign::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #006AA7;
        }

        /* Bottom bar */
        .sign::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #006AA7;
        }

        /* LEFT: icon, name, subtitle */
        .left-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            flex: 1;
        }

        .app-icon {
            width: 220px;
            height: 220px;
            border-radius: 48px;
            box-shadow: 0 8px 30px rgba(0, 106, 167, 0.25);
        }

        .app-name {
            font-size: 80px;
            font-weight: 900;
            color: #13254A;
            letter-spacing: -3px;
            line-height: 1;
            text-align: center;
        }

        .subtitle {
            font-size: 20px;
            font-weight: 400;
            color: #006AA7;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
        }

        /* DIVIDER */
        .vertical-divider {
            width: 4px;
            height: 500px;
            background: linear-gradient(180deg, transparent, #FECC02, transparent);
            flex-shrink: 0;
            margin: 0 60px;
        }

        /* RIGHT: QR + scan label */
        .right-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-shrink: 0;
        }

        .qr-wrapper {
            padding: 16px;
            border: 3px solid #13254A;
            border-radius: 16px;
        }

        .scan-label {
            font-size: 14px;
            font-weight: 700;
            color: #13254A;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        @media print {
            body { background: none; }
            .sign {
                transform: none !important;
                width: 11in;
                height: 8.5in;
            }
        }
    </style>
</head>
<body>

<div class="sign" id="sign">
    <div class="left-section">
        <img
            class="app-icon"
            src="Kubb Coach/Kubb Coach/Assets.xcassets/AppIcon.appiconset/coach4kubb.png"
            alt="Kubb Coach"
        >
        <div class="app-name">Kubb Coach</div>
        <div class="subtitle">Level Up Your Kubb Game</div>
    </div>

    <div class="vertical-divider"></div>

    <div class="right-section">
        <div class="qr-wrapper">
            <div id="qrcode"></div>
        </div>
        <div class="scan-label">Scan to Download</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    new QRCode(document.getElementById("qrcode"), {
        text: "https://apps.apple.com/app/id6759566850",
        width: 200,
        height: 200,
        colorDark: "#13254A",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    function scaleSign() {
        const sign = document.getElementById('sign');
        const scale = Math.min(
            (window.innerWidth * 0.95) / 1056,
            (window.innerHeight * 0.95) / 816
        );
        sign.style.transform = `scale(${scale})`;
        sign.style.marginBottom = `${(816 * scale) - 816}px`;
    }

    scaleSign();
    window.addEventListener('resize', scaleSign);
</script>

</body>
</html>
